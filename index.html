<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker - Mufti Rashid Alim Misbahi</title>
    <style>
        :root { 
            --primary: #00a3e0; 
            --accent: #f9b233;  
            --secondary: #64748b; 
            --danger: #dc2626; 
            --warning: #f59e0b; 
            --bg: #f1f5f9; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 4px solid var(--primary); }
        
        /* Login */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .pin-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .pin-box { width: 50px; height: 60px; font-size: 2rem; text-align: center; border: 2px solid #cbd5e1; border-radius: 8px; }
        
        #mainApp { display: none; }
        h2 { margin-top: 10px; color: #334155; font-size: 1.3rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--secondary); }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }
        .btn-update { background: var(--warning); color: white; margin-top: 10px; display: none; }
        .btn-cancel { background: transparent; color: var(--secondary); margin-top: 5px; text-decoration: underline; display: none; }
        .btn-login { background: var(--accent); color: white; max-width: 230px; }
        
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .subtotals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .subtotal-box { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; font-size: 0.85rem; border-left: 4px solid var(--accent); }
        .subtotal-box b { display: block; color: var(--primary); font-size: 1rem; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
        .tag { background: #e0f2fe; color: #0369a1; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .class-tag { background: #fef3c7; color: #92400e; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .actions { display: flex; gap: 10px; justify-content: flex-end; }
        .edit-btn, .delete-btn { cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <div class="card" style="text-align: center; width: 100%; max-width: 400px;">
            <h2>🔐 Secure Access</h2>
            <div class="pin-container">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
            </div>
            <button class="btn-login" onclick="checkPin()">Login</button>
            <p id="loginError" style="color: var(--danger); display: none; margin-top: 10px;">Ongeldige PIN.</p>
        </div>
    </div>

    <div id="mainApp">
        <div class="card">
            <h2 id="formTitle">📝 Log Hours</h2>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="form-group">
                <label>Class</label>
                <select id="classInput">
                    <option value="AO-10 (Ismail, Qari Riaz, Riaaz)">AO-10 (Ismail, Qari Riaz, Riaaz)</option>
                    <option value="Maulana Ismaiel Jahangier">Maulana Ismaiel Jahangier</option>
                    <option value="Maulana Ali Jahangier">Maulana Ali Jahangier</option>
                </select>
            </div>
            <div class="form-group">
                <label>Book</label>
                <select id="projectInput">
                    <option value="Sharh Aqaid">Sharh Aqaid</option>
                    <option value="Al-Hidayah">Al-Hidayah</option>
                    <option value="Al-Fawz Al-Kabeer">Al-Fawz Al-Kabeer</option>
                    <option value="Al-Muntaqad">Al-Muntaqad</option>
                    <option value="Noorul Anwaar">Noorul Anwaar</option>
                    <option value="Quraan">Quraan</option>
                    <option value="Nuzhatun Nazar">Nuzhatun Nazar</option>
                    <option value="Al-Husami">Al-Husami</option>
                    <option value="Tafseer Madarik al-Tanzeel">Tafseer Madarik al-Tanzeel</option>
                    <option value="Sarf">Sarf</option>
                    <option value="Nahw">Nahw</option>
                    <option value="Nahw">Other</option>                    
                </select>
            </div>
            <div class="row">
                <div><label>Hours</label><input type="number" id="hoursInput" placeholder="0"></div>
                <div><label>Minutes</label><input type="number" id="minsInput" placeholder="0"></div>
            </div>
            <button class="btn-add" id="addBtn" onclick="addEntry()">Add to Cloud</button>
            <button class="btn-update" id="updateBtn" onclick="updateEntry()">Save Changes</button>
            <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">Annuleren</button>
        </div>

        <div class="card">
            <h2>📊 Overview</h2>
            <div class="filter-grid">
                <select id="monthFilter" onchange="renderTable()">
                    <option value="all">All Months</option>
                    <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                    <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                    <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                    <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                </select>
            </div>
            <div id="subtotals" class="subtotals-grid"></div>
            <table>
                <thead><tr><th>Date</th><th>Class</th><th>Book</th><th>Time</th><th></th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://mbqaekezozemcrhzljcr.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icWFla2V6b3plbWNyaHpsamNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjQ0MzUsImV4cCI6MjA5NDA0MDQzNX0.WOZp3spdeLDmjebdKLbhlHAitGBCUt-kmf_9BE7b3iA";
    const CORRECT_PIN = "1104";
    let logs = [];
    let currentEditId = null;

    // PIN Logic
    const pinInputs = document.querySelectorAll('.pin-box');
    pinInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < 3) pinInputs[index + 1].focus();
            if (Array.from(pinInputs).every(i => i.value)) checkPin();
        });
    });

    function checkPin() {
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        if (pin === CORRECT_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            fetchLogsFromDB();
        } else {
            document.getElementById('loginError').style.display = 'block';
            pinInputs.forEach(i => i.value = '');
            pinInputs[0].focus();
        }
    }

    // DB: Ophalen
    async function fetchLogsFromDB() {
        const resp = await fetch(`${SB_URL}/rest/v1/time_logs?select=*`, {
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
        });
        const data = await resp.json();
        logs = data.map(d => ({
            id: d.id,
            dateRaw: d.date_raw,
            dateDisplay: d.date_display,
            className: d.class_name,
            bookName: d.book_name,
            hours: d.hours,
            minutes: d.minutes
        }));
        renderTable();
    }

    // DB: Toevoegen
    async function addEntry() {
        const dateVal = document.getElementById('dateInput').value;
        const entry = {
            teacher: "Mufti Rashid Alim Misbahi",
            date_raw: dateVal,
            date_display: new Date(dateVal).toLocaleDateString('en-GB'),
            class_name: document.getElementById('classInput').value,
            book_name: document.getElementById('projectInput').value,
            hours: parseInt(document.getElementById('hoursInput').value) || 0,
            minutes: parseInt(document.getElementById('minsInput').value) || 0
        };

        const resp = await fetch(`${SB_URL}/rest/v1/time_logs`, {
            method: "POST",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
            body: JSON.stringify(entry)
        });

        if (resp.ok) { fetchLogsFromDB(); resetForm(); } 
        else { const err = await resp.json(); alert("Fout: " + err.message); }
    }

    // DB: Verwijderen
    async function deleteEntry(id) {
        if (!confirm("Zeker weten?")) return;
        await fetch(`${SB_URL}/rest/v1/time_logs?id=eq.${id}`, {
            method: "DELETE",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
        });
        fetchLogsFromDB();
    }

    // DB: Bewerken
    function startEdit(id) {
        const entry = logs.find(l => l.id === id);
        currentEditId = id;
        document.getElementById('dateInput').value = entry.dateRaw;
        document.getElementById('classInput').value = entry.className;
        document.getElementById('projectInput').value = entry.bookName;
        document.getElementById('hoursInput').value = entry.hours;
        document.getElementById('minsInput').value = entry.minutes;
        
        document.getElementById('addBtn').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('formTitle').innerText = "✏️ Edit Entry";
    }

    async function updateEntry() {
        const dateVal = document.getElementById('dateInput').value;
        const updated = {
            date_raw: dateVal,
            date_display: new Date(dateVal).toLocaleDateString('en-GB'),
            class_name: document.getElementById('classInput').value,
            book_name: document.getElementById('projectInput').value,
            hours: parseInt(document.getElementById('hoursInput').value) || 0,
            minutes: parseInt(document.getElementById('minsInput').value) || 0
        };

        const resp = await fetch(`${SB_URL}/rest/v1/time_logs?id=eq.${currentEditId}`, {
            method: "PATCH",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify(updated)
        });

        if (resp.ok) { fetchLogsFromDB(); resetForm(); }
    }

    function renderTable() {
        const body = document.getElementById('logBody');
        const subtotalsDiv = document.getElementById('subtotals');
        const fMonth = document.getElementById('monthFilter').value;
        
        body.innerHTML = '';
        subtotalsDiv.innerHTML = '';
        let projMins = {};

        const filtered = logs.filter(l => fMonth === "all" || new Date(l.dateRaw).getMonth() == fMonth)
                            .sort((a,b) => new Date(b.dateRaw) - new Date(a.dateRaw));

        filtered.forEach(l => {
            const mins = (l.hours * 60) + l.minutes;
            projMins[l.bookName] = (projMins[l.bookName] || 0) + mins;
            body.innerHTML += `<tr>
                <td>${l.dateDisplay}</td>
                <td><span class="class-tag">${l.className}</span></td>
                <td><span class="tag">${l.bookName}</span></td>
                <td>${l.hours}h ${l.minutes}m</td>
                <td class="actions">
                    <span class="edit-btn" onclick="startEdit(${l.id})">✎</span>
                    <span class="delete-btn" onclick="deleteEntry(${l.id})">×</span>
                </td>
            </tr>`;
        });

        for (const [name, m] in Object.entries(projMins)) { /* Logic for subtotals boxes here */ }
    }

    function resetForm() {
        currentEditId = null;
        document.getElementById('dateInput').valueAsDate = new Date();
        document.getElementById('hoursInput').value = '';
        document.getElementById('minsInput').value = '';
        document.getElementById('addBtn').style.display = "block";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('formTitle').innerText = "📝 Log Hours";
    }

    document.getElementById('dateInput').valueAsDate = new Date();
</script>
</body>
</html>

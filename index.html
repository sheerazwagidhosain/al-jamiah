<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker - Mufti Rashid Alim Misbahi</title>
    <style>
        :root { 
            --primary: #00a3e0; 
            --accent: #f9b233;  
            --secondary: #64748b; 
            --danger: #dc2626; 
            --warning: #f59e0b; 
            --bg: #f1f5f9; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 4px solid var(--primary); }
        
        /* Login Styles */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .pin-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .pin-box { 
            width: 50px; height: 60px; font-size: 2rem; text-align: center; 
            border: 2px solid #cbd5e1; border-radius: 8px; background: white;
        }
        .pin-box:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(0,163,224,0.3); }
        
        #mainApp { display: none; }

        h2 { margin-top: 10px; color: #334155; font-size: 1.3rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--secondary); }
        
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }
        .btn-update { background: var(--warning); color: white; margin-top: 10px; display: none; }
        .btn-cancel { background: transparent; color: var(--secondary); margin-top: 5px; text-decoration: underline; font-size: 0.8rem; display: none; }
        .btn-login { background: var(--accent); color: white; width: 100%; max-width: 230px; font-size: 1.1rem; }
        
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .subtotals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .subtotal-box { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; font-size: 0.85rem; border-left: 4px solid var(--accent); }
        .subtotal-box b { display: block; color: var(--primary); font-size: 1rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
        th { font-size: 0.75rem; text-transform: uppercase; color: var(--secondary); }
        tfoot { font-weight: bold; background: #f8fafc; }
        .tag { background: #e0f2fe; color: #0369a1; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .class-tag { background: #fef3c7; color: #92400e; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .actions { display: flex; gap: 10px; justify-content: flex-end; }
        .edit-btn, .delete-btn { cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <div class="card" style="text-align: center; width: 100%; max-width: 400px;">
            <h2>🔐 Secure Access</h2>
            <p style="color: var(--secondary); font-size: 0.9rem; margin-bottom: 20px;">Enter PIN to manage cloud hours</p>
            <div class="pin-container">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
            </div>
            <button class="btn-login" onclick="checkPin()">Login</button>
            <p id="loginError" style="color: var(--danger); font-size: 0.8rem; margin-top: 15px; display: none;">Invalid PIN. Please try again.</p>
        </div>
    </div>

    <div id="mainApp">
        <div class="card" id="inputCard">
            <h2 id="formTitle">📝 Log Hours</h2>
            <div class="form-group">
                <label>Teacher</label>
                <input type="text" id="userInput" value="Mufti Rashid Alim Misbahi" readonly style="background: #f8fafc; color: #64748b; font-weight: 600;">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="form-group">
                <label>Class / Group</label>
                <select id="classInput">
                    <option value="AO-10 (Ismail, Qari Riaz, Riaaz)">AO-10 (Ismail, Qari Riaz, Riaaz)</option>
                    <option value="Maulana Ismaiel Jahangier">Maulana Ismaiel Jahangier</option>
                    <option value="Maulana Ali Jahangier">Maulana Ali Jahangier</option>
                </select>
            </div>
            <div class="form-group">
                <label>Book</label>
                <select id="projectInput">
                    <option value="Sharh Aqaid">Sharh Aqaid</option>
                    <option value="Al-Hidayah">Al-Hidayah</option>
                    <option value="Al-Fawz Al-Kabeer">Al-Fawz Al-Kabeer</option>
                    <option value="Al-Muntaqad">Al-Muntaqad</option>
                    <option value="Noorul Anwaar">Noorul Anwaar</option>
                    <option value="Quraan">Quraan</option>
                    <option value="Nuzhatun Nazar">Nuzhatun Nazar</option>
                    <option value="Al-Husami">Al-Husami</option>
                    <option value="Tafseer Madarik al-Tanzeel">Tafseer Madarik al-Tanzeel</option>
                    <option value="Sarf">Sarf</option>
                    <option value="Nahw">Nahw</option>
                </select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Hours</label>
                    <input type="number" id="hoursInput" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Minutes</label>
                    <input type="number" id="minsInput" placeholder="0" max="59">
                </div>
            </div>
            <button class="btn-add" id="addBtn" onclick="addEntry()">Add to Cloud Logbook</button>
            <button class="btn-update" id="updateBtn" onclick="updateEntry()">Save Changes</button>
            <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">Cancel</button>
        </div>

        <div class="card">
            <h2>📊 Overview & Filters</h2>
            <div class="filter-grid">
                <div>
                    <label>Month</label>
                    <select id="monthFilter" onchange="renderTable()">
                        <option value="all">All Months</option>
                        <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                        <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                        <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                        <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                    </select>
                </div>
                <div>
                    <label>Class</label>
                    <select id="classFilter" onchange="renderTable()">
                        <option value="all">All Classes</option>
                        <option value="AO-10 (Ismail, Qari Riaz, Riaaz)">AO-10</option>
                        <option value="Maulana Ismaiel Jahangier">M. Ismaiel</option>
                        <option value="Maulana Ali Jahangier">M. Ali</option>
                    </select>
                </div>
                <div>
                    <label>Book</label>
                    <select id="bookFilter" onchange="renderTable()">
                        <option value="all">All Books</option>
                        <option value="Sharh Aqaid">Sharh Aqaid</option>
                        <option value="Al-Hidayah">Al-Hidayah</option>
                        <option value="Al-Fawz Al-Kabeer">Al-Fawz Al-Kabeer</option>
                        <option value="Al-Muntaqad">Al-Muntaqad</option>
                        <option value="Noorul Anwaar">Noorul Anwaar</option>
                        <option value="Quraan">Quraan</option>
                        <option value="Nuzhatun Nazar">Nuzhatun Nazar</option>
                        <option value="Al-Husami">Al-Husami</option>
                        <option value="Tafseer Madarik al-Tanzeel">Tafseer Madarik</option>
                        <option value="Sarf">Sarf</option>
                        <option value="Nahw">Nahw</option>
                    </select>
                </div>
            </div>
            <div id="subtotals" class="subtotals-grid"></div>
            <table id="logTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Class</th>
                        <th>Book</th>
                        <th>Time</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3">TOTAL (Filtered)</td>
                        <td id="totalDisplay">0h 0m</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
   // --- SUPABASE CONFIGURATIE ---
const SB_URL = "https://mbqaekezozemcrhzljcr.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icWFla2V6b3plbWNyaHpsamNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjQ0MzUsImV4cCI6MjA5NDA0MDQzNX0.WOZp3spdeLDmjebdKLbhlHAitGBCUt-kmf_9BE7b3iA";
    
    const CORRECT_PIN = "1234";
    let logs = [];
    let editIndex = null;

    // PIN Logic
    const pinInputs = document.querySelectorAll('.pin-box');
    pinInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < pinInputs.length - 1) pinInputs[index + 1].focus();
            if (Array.from(pinInputs).every(inp => inp.value.length === 1)) checkPin();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) pinInputs[index - 1].focus();
        });
    });

    async function checkPin() {
        const enteredPin = Array.from(pinInputs).map(inp => inp.value).join('');
        if (enteredPin === CORRECT_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            await fetchLogsFromDB(); // Haal data op bij succesvol inloggen
        } else if (enteredPin.length === 4) {
            document.getElementById('loginError').style.display = 'block';
            pinInputs.forEach(inp => inp.value = '');
            pinInputs[0].focus();
        }
    }

    // Database: Ophalen
    async function fetchLogsFromDB() {
        try {
            const response = await fetch(`${SB_URL}/rest/v1/time_logs?select=*`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await response.json();
            logs = data.map(d => ({
                id: d.id,
                dateRaw: d.date_raw || "",
                dateDisplay: d.date_display,
                className: d.class_name,
                project: d.book_name,
                hours: d.hours,
                mins: d.minutes,
                user: d.teacher
            }));
            renderTable();
        } catch (e) { console.error("Fout bij ophalen:", e); }
    }

    // Database: Toevoegen
    async function addEntry() {
        const dateRaw = document.getElementById('dateInput').value;
        const entry = {
            teacher: "Mufti Rashid Alim Misbahi",
            date_raw: dateRaw,
            date_display: new Date(dateRaw).toLocaleDateString('en-GB'),
            class_name: document.getElementById('classInput').value,
            book_name: document.getElementById('projectInput').value,
            hours: parseInt(document.getElementById('hoursInput').value) || 0,
            minutes: parseInt(document.getElementById('minsInput').value) || 0
        };

        if ((entry.hours == 0 && entry.minutes == 0) || !dateRaw) return;

        const response = await fetch(`${SB_URL}/rest/v1/time_logs`, {
            method: "POST",
            headers: { 
                "apikey": SB_KEY, 
                "Authorization": `Bearer ${SB_KEY}`, 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify(entry)
        });

        if (response.ok) {
            await fetchLogsFromDB();
            resetForm();
        }
    }

    // Database: Verwijderen
    async function deleteEntry(index) {
        const entry = logs[index];
        if(!confirm("Record uit de database verwijderen?")) return;

        await fetch(`${SB_URL}/rest/v1/time_logs?id=eq.${entry.id}`, {
            method: "DELETE",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
        });
        await fetchLogsFromDB();
    }

    // Database: Updaten
    async function updateEntry() {
        if (editIndex === null) return;
        const entryId = logs[editIndex].id;
        const dateRaw = document.getElementById('dateInput').value;

        const updatedData = {
            date_raw: dateRaw,
            date_display: new Date(dateRaw).toLocaleDateString('en-GB'),
            class_name: document.getElementById('classInput').value,
            book_name: document.getElementById('projectInput').value,
            hours: parseInt(document.getElementById('hoursInput').value) || 0,
            minutes: parseInt(document.getElementById('minsInput').value) || 0
        };

        await fetch(`${SB_URL}/rest/v1/time_logs?id=eq.${entryId}`, {
            method: "PATCH",
            headers: { 
                "apikey": SB_KEY, 
                "Authorization": `Bearer ${SB_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(updatedData)
        });

        await fetchLogsFromDB();
        resetForm();
    }

    function renderTable() {
        const body = document.getElementById('logBody');
        const totalDisplay = document.getElementById('totalDisplay');
        const subtotalsDiv = document.getElementById('subtotals');
        
        const fMonth = document.getElementById('monthFilter').value;
        const fClass = document.getElementById('classFilter').value;
        const fBook = document.getElementById('bookFilter').value;
        
        body.innerHTML = '';
        subtotalsDiv.innerHTML = '';
        let totalMins = 0;
        let projectMins = {};
        
        let displayLogs = [...logs].sort((a, b) => new Date(b.dateRaw) - new Date(a.dateRaw));

        displayLogs = displayLogs.filter(entry => {
            const matchMonth = (fMonth === "all" || (entry.dateRaw && new Date(entry.dateRaw).getMonth() == fMonth));
            const matchClass = (fClass === "all" || entry.className === fClass);
            const matchBook  = (fBook === "all" || entry.project === fBook);
            return matchMonth && matchClass && matchBook;
        });

        displayLogs.forEach((entry, i) => {
            const actualIndex = logs.indexOf(entry);
            const entryMins = (parseInt(entry.hours) * 60) + parseInt(entry.mins);
            totalMins += entryMins;
            projectMins[entry.project] = (projectMins[entry.project] || 0) + entryMins;
            
            body.innerHTML += `<tr>
                <td><b>${entry.dateDisplay}</b></td>
                <td><span class="class-tag">${entry.className}</span></td>
                <td><span class="tag">${entry.project}</span></td>
                <td>${entry.hours}h ${entry.mins}m</td>
                <td class="actions">
                    <span class="edit-btn" onclick="startEdit(${actualIndex})">✎</span>
                    <span class="delete-btn" onclick="deleteEntry(${actualIndex})">×</span>
                </td>
            </tr>`;
        });

        Object.keys(projectMins).forEach(proj => {
            const h = Math.floor(projectMins[proj] / 60);
            const m = projectMins[proj] % 60;
            subtotalsDiv.innerHTML += `<div class="subtotal-box">${proj}<b>${h}h ${m}m</b></div>`;
        });

        totalDisplay.innerText = `${Math.floor(totalMins / 60)}h ${totalMins % 60}m`;
    }

    function startEdit(index) {
        editIndex = index;
        const entry = logs[index];
        document.getElementById('dateInput').value = entry.dateRaw;
        document.getElementById('classInput').value = entry.className;
        document.getElementById('projectInput').value = entry.project;
        document.getElementById('hoursInput').value = entry.hours;
        document.getElementById('minsInput').value = entry.mins;
        document.getElementById('formTitle').innerText = "✏️ Edit Entry (Cloud)";
        document.getElementById('addBtn').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        editIndex = null;
        document.getElementById('dateInput').valueAsDate = new Date();
        document.getElementById('hoursInput').value = '';
        document.getElementById('minsInput').value = '';
        document.getElementById('formTitle').innerText = "📝 Log Hours";
        document.getElementById('addBtn').style.display = "block";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('cancelBtn').style.display = "none";
    }

    document.getElementById('dateInput').valueAsDate = new Date();
</script>

</body>
</html>
